<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pinbreakstudio — Premium Template</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --bg: #0a0908;
    --glass: rgba(28,25,22,0.55);
    --glass-border: rgba(244,237,227,0.12);
    --text: #f4ede3;
    --text-dim: rgba(244,237,227,0.6);
    --accent: #d8531f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    background: var(--bg);
    color: var(--text);
    font-family:'DM Sans', sans-serif;
    height:100%;
    overflow:hidden;
  }
  .frame{
    position:relative;
    width:100%;
    max-width:430px;
    height:100vh;
    margin:0 auto;
    background-color:var(--bg);
    background-image: radial-gradient(rgba(244,237,227,0.14) 1px, transparent 1.3px);
    background-size:22px 22px;
    overflow:hidden;
  }
  .topbar{
    position:absolute;
    top:18px; left:18px; right:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:20;
  }
  .icon-btn{
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(20,18,16,0.7);
    border:1px solid rgba(244,237,227,0.1);
    display:flex; align-items:center; justify-content:center;
    color:var(--text);
  }
  .icon-group{ display:flex; gap:8px; }
  .icon-btn svg{ width:16px; height:16px; }
  .avatar-chip{
    position:absolute;
    top:27%; left:21%;
    width:46px; height:46px;
50%;
    background:#f4ede3;
    solid var(--bg);
    display:flex; align-items:center;
    z-index:15;
    overflow:hidden;
  }
  .avatar-chip span{ font-size:18px; }
  .hero{
    position:absolute;
    top:30%; left:31%;
    width:48%;
    aspect-ratio:3/4;
    border-radius:22px;
    overflow:hidden;
    z-index:5;
    background:#1a1714;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
  }
  .hero img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .hero::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 55%, rgba(216,83,31,0.35) 100%);
  }
  .float-card{
    position:absolute;
    border-radius:18px;
    padding:14px;
    z-index:10;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .fc-top{ display:flex; justify-content:space-between; align-items:center; }
  .fc-label{ font-size:12.5px; font-weight:600; }
  .fc-arrow{ opacity:0.7; }
  .fc-profile{ display:flex; align-items:center; gap:8px; }
  .fc-avatar{ width:22px; height:22px; border-radius:50%; background:rgba(244,237,227,0.25); flex-shrink:0; }
  .fc-name{ font-size:10.5px; line-height:1.3; }
  .fc-name b{ display:block; font-weight:600; }
  .fc-name small{ opacity:0.65; }
  .notif{
    top:22%; right:5%;
    width:33%;
    background:#f4ede3;
    color:#15130f;
    aspect-ratio:3/3.4;
  }
  .notif .fc-label{ color:#15130f; }
  .badge{
    background:var(--accent);
    color:#fff;
    font-size:11px;
    font-weight:700;
    border-radius:100px;
    padding:2px 8px;
  }
  .notif-thumb{
    flex-grow:1;
    margin-top:8px;
    border-radius:12px;
    overflow:hidden;
    background:#0c0b0a;
  }
  .notif-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .stat-a{
    top:42%; left:2%;
    width:38%;
    aspect-ratio:3/2.6;
    background:var(--glass);
    border:1px solid var(--glass-border);
    color:var(--text);
  }
  .stat-a .glyph{
    font-size:34px;font-weight:600;
    letter-spacing:-0.02em;
  }
  .stat-b{
    top:55%; right:2%;
    width:37%;
    aspect-ratio:3/2.6;
    background:var(--accent);
    color:#fff;
  }
  .bars{ display:flex; align-items:flex-end; gap:3px; height:34px; }
  .bars i{ width:4px; background:rgba(255,255,255,0.85); border-radius:2px; display:block; }
  .brand{
    position:absolute;
    bottom:14%; left:14%;
    font-family:'JetBrains Mono', monospace;
    font-size:18px;
    letter-spacing:0.12em;
    color:rgba(244,237,227,0.55);
    z-index:6;
  }
  .bottom-hint{
    position:absolute;
    bottom:5%;
    left:0; right:0;
    text-align:center;
    z-index:20;
  }
  .bottom-hint p{
    font-weight:700;
    font-size:15px;
    margin-bottom:10px;
  }
  .drag-pill{
    width:46px; height:4px;
    border-radius:100px;
    background:rgba(244,237,227,0.6);
    margin:0 auto;
  }
  @media (prefers-reduced-motion: reduce){
    .float-card, .avatar-chip{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="topbar">
    <div class="icon-btn" id="closeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </div>
    <div class="icon-group">
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 4h6v6"/><path d="M20 4 10 14"/><path d="M20 14v6H4V4h6"/></svg>
      </div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </div>
    </div>
  </div>
  <div class="avatar-chip" id="avatarChip"><span>🙂</span></div>
  <div class="hero" id="hero">
    <img id="heroImg" alt="Hero placeholder">
  </div>
  <div class="float-card notif" id="notifCard">
    <div class="fc-top">
      <span class="fc-label">Notifikasi</span>
      <span class="badge" id="badgeCount">12</span>
    </div>
    <div class="notif-thumb"><img id="notifImg" alt="Notif thumbnail"></div>
  </div>
  <div class="float-card stat-a" id="statA">
    <div class="fc-top">
      <span class="fc-label">Label A</span>
      <span class="fc-arrow">→</span>
    </div>
    <div class="glyph" id="glyphA">A+</div>
    <div class="fc-profile">
      <div class="fc-avatar"></div>
      <div class="fc-name"><b id="nameA">Nama</b><small id="pctA">76%</small></div>
    </div>
  </div>
  <div class="float-card stat-b" id="statB">
    <div class="fc-top">
      <span class="fc-label">Label B</span>
      <span class="fc-arrow">→</span>
    </div>
    <div class="bars" id="barsB"></div>
    <div class="fc-profile">
      <div class="fc-avatar"></div>
      <div class="fc-name"><b id="nameB">Nama</b><small id="pctB">90%</small></div>
    </div>
  </div>
  <div class="brand" id="brandText">BRAND.AI</div>
  <div class="bottom-hint">
    <p id="hintText">Geser ke atas untuk menjelajahi</p>
    <div class="drag-pill"></div>
  </div>
</div>
<script>
!function(){var t={avatarEmoji:"🙂",brandName:"PINBREAK",hintText:"See pinned tweet 👇",badgeCount:"12",cardA:{label:"Revenue",glyph:"$12K",name:"Monthly",pct:"+45%"},cardB:{label:"Users",name:"Active",pct:"2.4K"},barHeights:[40,65,85,100,80,55,35],heroPrompt:"dramatic editorial portrait figure in long dark coat walking through soft smoke strong rim light amber and black color grade cinematic film still 85mm lens ultra detailed moody atmosphere",notifThumbPrompt:"abstract dark glass screen reflection warm amber glow minimal close up macro cinematic",lock:!0,init:function(){if(document.getElementById("avatarChip").querySelector("span").textContent=t.avatarEmoji,document.getElementById("brandText").textContent=t.brandName,document.getElementById("hintText").textContent=t.hintText,document.getElementById("badgeCount").textContent=t.badgeCount,document.getElementById("glyphA").textContent=t.cardA.glyph,document.getElementById("nameA").textContent=t.cardA.name,document.getElementById("pctA").textContent=t.cardA.pct,document.querySelector("#statA .fc-label").textContent=t.cardA.label,document.getElementById("nameB").textContent=t.cardB.name,document.getElementById("pctB").textContent=t.cardB.pct,document.querySelector("#statB .fc-label").textContent=t.cardB.label,t.barHeights.forEach(function(t){var e=document.createElement("i");e.style.height=t+"%",document.getElementById("barsB").appendChild(e)}),document.getElementById("heroImg").src="https://image.pollinations.ai/prompt/"+encodeURIComponent(t.heroPrompt)+"?width=700&height=980&nologo=true",document.getElementById("notifImg").src="https://image.pollinations.ai/prompt/"+encodeURIComponent(t.notifThumbPrompt)+"?width=400&height=400&nologo=true",!window.matchMedia("(prefers-reduced-motion: reduce)").matches){["#avatarChip","#hero","#notifCard","#statA","#statB","#brandText"].forEach(function(t){gsap.set(t,{opacity:0,y:24}),gsap.to(t,{opacity:1,y:0,duration:.8,stagger:.08,ease:"power3.out"})});["#notifCard","#statA","#statB","#avatarChip"].forEach(function(t,e){gsap.to(t,{y:"+=8",duration:2.4+.3*e,ease:"sine.inOut",repeat:-1,yoyo:!0,delay:.8+.2*e})})}},decodeUrl:function(t){try{var e=atob(t);return decodeURIComponent(escape(e))}catch(t){return""}}}();t.init(),document.getElementById("closeBtn").addEventListener("click",function(){console.log("close")})}();
</script>
</body>
</html>
